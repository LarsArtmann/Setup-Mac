name: Nix Flake Check

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  check:
    name: Check Nix Flake
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v28
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - name: Setup Cachix
        uses: cachix/cachix-action@v12
        with:
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          name: larsartmann

      - name: Check Flake
        run: nix flake check

  build-darwin:
    name: Build Darwin Configuration
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v28
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - name: Setup Cachix
        uses: cachix/cachix-action@v12
        with:
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          name: larsartmann

      - name: Build Darwin Configuration
        run: nix build .#darwinConfigurations.Lars-MacBook-Air.config.system.build.toplevel

  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v28
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - name: Check Syntax (No Build)
        run: nix flake check --no-build

  go-test:
    name: Go Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: pkgs/emeet-pixyd/go.mod

      - name: Test emeet-pixyd
        working-directory: pkgs/emeet-pixyd
        run: go test ./...

      - name: Vet emeet-pixyd
        working-directory: pkgs/emeet-pixyd
        run: go vet ./...

  go-test-dnsblockd:
    name: Go Tests (dnsblockd)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: platforms/nixos/programs/dnsblockd/go.mod

      - name: Build dnsblockd
        working-directory: platforms/nixos/programs/dnsblockd
        run: go build ./...

      - name: Vet dnsblockd
        working-directory: platforms/nixos/programs/dnsblockd
        run: go vet ./...
