name: Update Flake Lock

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

jobs:
  update:
    name: Update flake.lock
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v22
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - name: Update flake.lock
        run: nix flake update

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          title: "chore(deps): update flake.lock"
          commit-message: "chore(deps): update flake.lock"
          branch: "auto/flake-lock-update"
          delete-branch: true
          body: |
            Automated flake.lock update scheduled for Monday 02:00 UTC.

            Review the changes and merge if all checks pass.
