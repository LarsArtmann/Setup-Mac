# BuildFlow Configuration
# See: https://github.com/larsartmann/buildflow

# Build mode: full, fast, ci, dev, pre-commit
build_mode: full

# Parallel execution
parallel: true
max_concurrency: 4

# File settings
max_file_size: 350  # lines
dupl_threshold: 30  # tokens

# TODO comment severity: debug, info, warn, error
todo_severity: info

# Patterns to exclude from checks
exclude:
  - vendor
  - .git
  - node_modules
  - dist
  - "*.pb.go"
  - "*.gen.go"
  - flake

# Auto-fix settings
auto_fix: false

# Logging
verbose: false
log_level: info"
